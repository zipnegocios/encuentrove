server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
  gzip_min_length 1024;

  location = /env-config.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    expires -1;
  }

  # Proxy de /api/ al api-server (Express) local, que corre en el mismo
  # contenedor en el puerto 8080. El api-server reenvia /api/v1/* al backend
  # Java (JAVA_BACKEND_URL) y maneja /api/reports, /api/watches/* y
  # /api/healthz el mismo — ver artifacts/api-server/src/app.ts.
  location /api/ {
    proxy_pass http://127.0.0.1:8080/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # APK de la app movil — nginx no conoce este tipo por default.
  location ~* \.apk$ {
    add_header Content-Disposition "attachment";
    default_type application/vnd.android.package-archive;
    add_header Cache-Control "no-cache";
  }
}
