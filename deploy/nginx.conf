server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
  gzip_min_length 1024;

  # Headers de seguridad (hallazgos del scan 2026-06-28: CSP/HSTS/X-Frame-Options/
  # X-Content-Type-Options ausentes). "always" para que se envien tambien en
  # respuestas de error (404/502), no solo en las 200.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https://encuentrove-bucket.s3.us-east-1.amazonaws.com https://api.dicebear.com; connect-src 'self'; worker-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'self'" always;

  location = /env-config.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    expires -1;
  }

  # Proxy de /api/ al api-server (Express) local, que corre en el mismo
  # contenedor en el puerto 8080. El api-server reenvia /api/v1/* al backend
  # Java (JAVA_BACKEND_URL) y maneja /api/reports, /api/watches/* y
  # /api/healthz el mismo — ver artifacts/api-server/src/app.ts.
  location /api/ {
    proxy_pass http://127.0.0.1:8080/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;
  }

  # Sitemap dinamico (incluye personas/animales activos), generado por el
  # api-server desde el feed del backend Java.
  location = /sitemap.xml {
    proxy_pass http://127.0.0.1:8080/api/sitemap.xml;
  }

  # SSE (feed en tiempo real, ver api-server/src/routes/sse.ts) — conexion
  # larga, sin buffer. Sin esto nginx bufferea la respuesta completa antes de
  # enviarla (rompe el push en tiempo real) o la corta por el
  # proxy_read_timeout corto del location /api/ generico de arriba.
  location = /api/events {
    proxy_pass http://127.0.0.1:8080/api/events;
    proxy_set_header Host $host;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
    chunked_transfer_encoding off;
  }

  # Bots de previsualizacion social (Facebook, WhatsApp, Telegram, etc.) no
  # ejecutan JS, asi que no pueden leer el OG dinamico que inyecta el SPA.
  # Se les sirve un HTML server-side con la foto/nombre reales de esa persona
  # (ver $is_social_bot en nginx-maps.conf y api-server/src/routes/og.ts).
  # Cualquier otro visitante (navegador real, Googlebot que si ejecuta JS)
  # recibe el SPA normal.
  location ~ ^/ser/([^/]+)(?:/[^/]+)?/?$ {
    if ($is_social_bot) {
      proxy_pass http://127.0.0.1:8080/api/og/ser/$1;
      break;
    }
    try_files /index.html =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # APK de la app movil — nginx no conoce este tipo por default.
  location ~* \.apk$ {
    add_header Content-Disposition "attachment";
    default_type application/vnd.android.package-archive;
    add_header Cache-Control "no-cache";
  }
}
