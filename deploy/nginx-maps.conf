# Included inside the http {} context (Alpine's nginx package includes every
# *.conf under /etc/nginx/http.d/ there). map{} must live at http level, not
# inside a server{} block — kept in its own file for that reason.
map $http_user_agent $is_social_bot {
    default 0;
    "~*facebookexternalhit|Facebot|Twitterbot|WhatsApp|TelegramBot|LinkedInBot|Slackbot|Discordbot|SkypeUriPreview|Pinterest|redditbot|vkShare|Viber|Line" 1;
}
