server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
  gzip_min_length 1024;

  # Headers de seguridad (hallazgos del scan 2026-06-28: CSP/HSTS/X-Frame-Options/
  # X-Content-Type-Options ausentes). "always" para que se envien tambien en
  # respuestas de error (404/502), no solo en las 200.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https://encuentrove-bucket.s3.us-east-1.amazonaws.com https://api.dicebear.com; connect-src 'self'; worker-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'self'" always;

  location = /env-config.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    expires -1;
  }

  # Proxy API calls to the backend (avoids CORS and mixed-content issues).
  # BACKEND_URL is injected by docker-entrypoint.sh at container startup.
  location /api/ {
    proxy_pass BACKEND_PLACEHOLDER/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # APK temporal de la app movil — nginx no conoce este tipo por default.
  location ~* \.apk$ {
    add_header Content-Disposition "attachment";
    default_type application/vnd.android.package-archive;
    add_header Cache-Control "no-cache";
  }
}
